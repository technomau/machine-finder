<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Machine Finder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
.wrap{max-width:1100px;margin:0 auto}
h1{color:#38bdf8;font-size:1.4rem;margin-bottom:4px}
p.sub{color:#64748b;font-size:.82rem;margin-bottom:18px}
.row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
input[type=text]{flex:1;min-width:200px;padding:10px 14px;border-radius:7px;border:1px solid #334155;background:#1e293b;color:#fff;font-size:.95rem;outline:none}
input[type=text]:focus{border-color:#38bdf8}
button{padding:10px 16px;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:.85rem}
.b1{background:#0ea5e9;color:#fff}
.b2{background:#10b981;color:#fff}
.b3{background:#475569;color:#fff}
.b4{background:#4285f4;color:#fff}
.ctrl{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;font-size:.82rem;color:#94a3b8}
.cnt{background:#1e3a5f;color:#38bdf8;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-bottom:18px}
.card{background:#1e293b;border:1px solid #2d3f55;border-radius:7px;padding:8px 11px;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.card:hover{border-color:#38bdf8}
.card input{width:14px;height:14px;accent-color:#38bdf8;cursor:pointer;margin-top:2px;flex-shrink:0}
.card .nm{font-size:.83rem;font-weight:600}
.card .sec{font-size:.65rem;color:#64748b}
#res{display:none;margin-top:6px}
.reshead{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.mode-btn{padding:5px 12px;border:1px solid #334155;border-radius:16px;background:transparent;color:#94a3b8;cursor:pointer;font-size:.76rem}
.mode-btn.on{background:#0ea5e9;border-color:#0ea5e9;color:#fff;font-weight:700}
table{width:100%;border-collapse:collapse}
th{background:#1e293b;color:#64748b;font-size:.73rem;text-align:left;padding:7px 11px;border-bottom:1px solid #2d3f55}
td{padding:8px 11px;border-bottom:1px solid #182030;font-size:.84rem;vertical-align:middle}
tr:hover td{background:#1a2740}
.ab{display:inline-block;padding:4px 11px;background:#0ea5e9;color:#fff;border-radius:5px;text-decoration:none;font-size:.75rem;font-weight:700}
.ab:hover{background:#0284c7}
.ab.g{background:#4285f4}
.ab.g:hover{background:#2b6de8}
.badge{background:#1e3a5f;color:#38bdf8;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700;display:inline-block}
#excBox{display:none;margin-top:10px}
textarea{width:100%;height:140px;background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:9px;font-size:.74rem;font-family:monospace;resize:vertical}
.foot{margin-top:26px;color:#2d3f55;font-size:.7rem;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<h1>&#9881; Industrial Machine Finder</h1>
<p class="sub">Ricerca su 15 marketplace di macchinari industriali &mdash; technomau.github.io/machine-finder</p>

<div class="row">
  <input type="text" id="kw" placeholder="es. CNC lathe, hydraulic press, injection molding, tornio CNC..." />
  <button class="b1" onclick="doSearch()">Cerca</button>
  <button class="b2" onclick="openAll()">Apri Tutti</button>
</div>

<div class="ctrl">
  <input type="checkbox" id="sa" checked onchange="togAll(this)" style="width:14px;height:14px;accent-color:#38bdf8;cursor:pointer">
  <label for="sa" style="cursor:pointer">Seleziona tutti</label>
  <span class="cnt" id="cnt">15/15 siti</span>
</div>

<div class="grid" id="grid"></div>

<div id="res">
  <div class="reshead">
    <button class="mode-btn on" id="mD" onclick="setMode('d')">Link Diretti</button>
    <button class="mode-btn" id="mG" onclick="setMode('g')">Google site:</button>
    <span id="rtitle" style="color:#64748b;font-size:.84rem"></span>
  </div>
  <table>
    <thead><tr><th>#</th><th>Marketplace</th><th>Settore</th><th>Link</th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="b3" onclick="togExc()" style="font-size:.78rem">Esporta per Excel</button>
  </div>
  <div id="excBox">
    <p style="font-size:.73rem;color:#64748b;margin:8px 0 4px">Copia e incolla in Excel (cella A1):</p>
    <textarea id="excData" readonly></textarea>
  </div>
</div>

<div class="foot">Industrial Machine Finder &mdash; modifica i siti direttamente su GitHub</div>
</div>

<script>
var S=[
 {i:"machinio",   n:"Machinio",       d:"machinio.com",       u:"https://www.machinio.com/listings?search=",           s:"Generale"},
 {i:"exapro",     n:"Exapro",         d:"exapro.com",         u:"https://www.exapro.com/search/?q=",                   s:"Generale"},
 {i:"surplex",    n:"Surplex",        d:"surplex.com",        u:"https://www.surplex.com/en/search/?q=",               s:"Aste"},
 {i:"machpoint",  n:"MachinePoint",   d:"machinepoint.com",   u:"https://www.machinepoint.com/used-machinery/?q=",     s:"Plastica/Food"},
 {i:"machub",     n:"Machine Hub",    d:"machinehub.com",     u:"https://machinehub.com/search?q=",                    s:"CNC/Utensili"},
 {i:"aucto",      n:"Aucto",          d:"aucto.com",          u:"https://www.aucto.com/search?q=",                     s:"Aste"},
 {i:"mascus",     n:"Mascus",         d:"mascus.com",         u:"https://www.mascus.com/search?keyword=",              s:"Pesante/Edile"},
 {i:"kitmondo",   n:"Kitmondo",       d:"kitmondo.com",       u:"https://www.kitmondo.com/search/?q=",                 s:"Generale"},
 {i:"euromach",   n:"Euro Machinery", d:"euro-machinery.com", u:"https://www.euro-machinery.com/?s=",                  s:"Plastica/Riciclo"},
 {i:"machline",   n:"MachineryLine",  d:"machineryline.info", u:"https://machineryline.info/search/?q=",               s:"Generale"},
 {i:"machseek",   n:"MachineSeeker",  d:"machineseeker.com",  u:"https://www.machineseeker.com/en/?q=",                s:"Generale"},
 {i:"trademach",  n:"TradeMachines",  d:"trademachines.com",  u:"https://trademachines.com/search?q=",                 s:"Aste aggregato"},
 {i:"topmach",    n:"Top Machine",    d:"topmachine.com",     u:"https://www.topmachine.com/?s=",                      s:"Food/Beverage"},
 {i:"bids",       n:"BidSpotter",     d:"bidspotter.com",     u:"https://www.bidspotter.com/en-us/search?q=",          s:"Aste industriali"},
 {i:"ironpl",     n:"IronPlanet",     d:"ironplanet.com",     u:"https://www.ironplanet.com/search?q=",                s:"Pesante/Mining"}
];

var mode="d";
var gr=document.getElementById("grid");
S.forEach(function(x){
  var c=document.createElement("div");
  c.className="card";
  c.innerHTML='<input type="checkbox" id="x'+x.i+'" checked onchange="updCnt()">'
    +'<div><div class="nm">'+x.n+'</div><div class="sec">'+x.s+'</div></div>';
  gr.appendChild(c);
});

function updCnt(){
  var n=S.filter(function(x){var e=document.getElementById("x"+x.i);return e&&e.checked;}).length;
  document.getElementById("cnt").textContent=n+"/"+S.length+" siti";
}
function togAll(cb){
  S.forEach(function(x){var e=document.getElementById("x"+x.i);if(e)e.checked=cb.checked;});
  updCnt();
}
function isc(x){var e=document.getElementById("x"+x.i);return e&&e.checked;}
function getSel(){return S.filter(isc);}
function enc(v){return encodeURIComponent(v.trim());}
function mkUrl(x,kw){
  return mode==="g"
    ?"https://www.google.com/search?q="+enc(kw)+"+site:"+x.d
    :x.u+enc(kw);
}
function setMode(m){
  mode=m;
  document.getElementById("mD").className="mode-btn"+(m==="d"?" on":"");
  document.getElementById("mG").className="mode-btn"+(m==="g"?" on":"");
  var kw=document.getElementById("kw").value.trim();
  if(kw) render(getSel(),kw);
}
function render(sel,kw){
  var tb=document.getElementById("tb"),tsv="Sito	Settore	URL
";
  tb.innerHTML="";
  sel.forEach(function(x,i){
    var u=mkUrl(x,kw),isG=mode==="g";
    var tr=document.createElement("tr");
    tr.innerHTML='<td style="color:#475569">'+(i+1)+'</td>'
      +'<td><strong>'+x.n+'</strong></td>'
      +'<td><span class="badge">'+x.s+'</span></td>'
      +'<td><a class="ab'+(isG?" g":"")+'" href="'+u+'" target="_blank" rel="noopener">'
      +(isG?"Google":"Apri")+'</a></td>';
    tb.appendChild(tr);
    tsv+=x.n+"	"+x.s+"	"+u+"
";
  });
  document.getElementById("excData").value=tsv;
}
function doSearch(){
  var kw=document.getElementById("kw").value.trim();
  if(!kw){alert("Inserisci un termine di ricerca");return;}
  var sel=getSel();
  if(!sel.length){alert("Seleziona almeno un sito");return;}
  render(sel,kw);
  document.getElementById("res").style.display="block";
  document.getElementById("rtitle").textContent=sel.length+' risultati per: "'+kw+'"';
  document.getElementById("excBox").style.display="none";
  document.getElementById("res").scrollIntoView({behavior:"smooth"});
}
function openAll(){
  var kw=document.getElementById("kw").value.trim();
  if(!kw){alert("Inserisci prima il termine di ricerca");return;}
  doSearch();
  var sel=getSel(),i=0;
  var t=setInterval(function(){
    if(i>=sel.length){clearInterval(t);return;}
    window.open(mkUrl(sel[i],kw),"_blank");i++;
  },700);
}
function togExc(){
  var e=document.getElementById("excBox");
  e.style.display=e.style.display==="none"?"block":"none";
  if(e.style.display==="block"){document.getElementById("excData").select();try{document.execCommand("copy");}catch(e){}}
}
document.getElementById("kw").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch();});
</script>
</body>
</html>
