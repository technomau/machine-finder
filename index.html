<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Industrial Machine Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.6rem; font-weight: 700; color: #38bdf8; margin-bottom: 4px; }
  .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }
  .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
  input[type=text] {
    flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #334155;
    background: #1e293b; color: #f1f5f9; font-size: 1rem; outline: none;
  }
  input[type=text]:focus { border-color: #38bdf8; }
  .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: opacity .2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #0ea5e9; color: white; }
  .btn-success { background: #10b981; color: white; }
  .btn-secondary { background: #475569; color: white; }
  .sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .site-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color .2s;
  }
  .site-card:hover { border-color: #38bdf8; }
  .site-card input[type=checkbox] { width: 16px; height: 16px; accent-color: #38bdf8; cursor: pointer; }
  .site-card label { cursor: pointer; font-size: 0.88rem; font-weight: 500; }
  .site-card .tag { font-size: 0.68rem; color: #64748b; }
  .select-all-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: #94a3b8; font-size: 0.83rem; }
  #results { display: none; }
  #results h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #1e293b; color: #94a3b8; font-size: 0.78rem; text-align: left; padding: 8px 12px; border-bottom: 1px solid #334155; }
  td { padding: 10px 12px; border-bottom: 1px solid #1e293b; font-size: 0.88rem; vertical-align: middle; }
  tr:hover td { background: #1e293b; }
  a.link-btn {
    display: inline-block; padding: 5px 12px; background: #0ea5e9; color: white;
    border-radius: 6px; text-decoration: none; font-size: 0.78rem; font-weight: 600;
  }
  a.link-btn:hover { background: #0284c7; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; background: #1e3a5f; color: #38bdf8; }
  #copyExcel { display: none; margin-top: 12px; }
  textarea#excelData { width: 100%; height: 180px; background: #1e293b; border: 1px solid #334155; color: #94a3b8; border-radius: 8px; padding: 10px; font-size: 0.78rem; font-family: monospace; resize: vertical; }
  .footer { margin-top: 32px; color: #334155; font-size: 0.75rem; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>&#128295; Industrial Machine Finder</h1>
  <p class="subtitle">Cerca simultaneamente su tutti i principali marketplace di macchinari industriali</p>

  <div class="search-box">
    <input type="text" id="keyword" placeholder="es. CNC milling machine, injection molding, press..." autocomplete="off" />
    <button class="btn btn-primary" onclick="doSearch()">&#128269; Cerca</button>
    <button class="btn btn-success" onclick="openAll()">&#128640; Apri Tutti</button>
  </div>

  <div class="select-all-row">
    <input type="checkbox" id="selectAll" checked onchange="toggleAll(this)">
    <label for="selectAll">Seleziona / Deseleziona tutti</label>
    <span id="countBadge" style="margin-left:8px;"></span>
  </div>

  <div class="sites-grid" id="sitesGrid"></div>

  <div id="results">
    <h2 id="resultsTitle"></h2>
    <table id="resultsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Marketplace</th>
          <th>Settore</th>
          <th>Link diretto</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
    <button class="btn btn-secondary" style="margin-top:14px;" onclick="toggleExcel()">&#128203; Copia per Excel</button>
    <div id="copyExcel">
      <p style="font-size:0.78rem;color:#64748b;margin:8px 0 4px;">Copia il testo qui sotto e incollalo in Excel (cella A1):</p>
      <textarea id="excelData" readonly></textarea>
    </div>
  </div>

  <div class="footer">Industrial Machine Finder &bull; Tutti i link aprono i siti originali</div>
</div>

<script>
var SITES = [
  { id: "machinio",      name: "Machinio",        url: "https://www.machinio.com/search?q=",             sector: "Generale"        },
  { id: "exapro",        name: "Exapro",           url: "https://www.exapro.com/search/?q=",              sector: "Generale"        },
  { id: "surplex",       name: "Surplex",          url: "https://www.surplex.com/en/search/?q=",          sector: "Aste"            },
  { id: "machinepoint",  name: "MachinePoint",     url: "https://www.machinepoint.com/search?q=",         sector: "Plastica/Food"   },
  { id: "machinehub",    name: "Machine Hub",      url: "https://machinehub.com/search?q=",               sector: "CNC/Utensili"    },
  { id: "aucto",         name: "Aucto",            url: "https://www.aucto.com/search?q=",                sector: "Aste"            },
  { id: "mascus",        name: "Mascus",           url: "https://www.mascus.com/search?keyword=",         sector: "Pesante/Edile"   },
  { id: "kitmondo",      name: "Kitmondo",         url: "https://www.kitmondo.com/search/?q=",            sector: "Generale"        },
  { id: "euromachinery", name: "Euro Machinery",   url: "https://www.euro-machinery.com/?s=",             sector: "Plastica/Riciclo"},
  { id: "machineryline", name: "MachineryLine",    url: "https://machineryline.info/search/?q=",          sector: "Generale"        },
  { id: "machineseeker", name: "MachineSeeker",    url: "https://www.machineseeker.com/en/?q=",           sector: "Generale"        },
  { id: "trademachines", name: "TradeMachines",    url: "https://trademachines.com/search?q=",            sector: "Aste aggregato"  },
  { id: "topmachine",    name: "Top Machine",      url: "https://www.topmachine.com/?s=",                 sector: "Food/Beverage"   },
  { id: "bidspotter",    name: "BidSpotter",       url: "https://www.bidspotter.com/en-us/search?q=",     sector: "Aste industriali"},
  { id: "ironplanet",    name: "IronPlanet",       url: "https://www.ironplanet.com/search?q=",           sector: "Pesante/Mining"  }
];

var grid = document.getElementById("sitesGrid");
SITES.forEach(function(s) {
  var card = document.createElement("div");
  card.className = "site-card";
  card.innerHTML = '<input type="checkbox" id="chk_' + s.id + '" checked onchange="updateCount()">' +
    '<div><label for="chk_' + s.id + '">' + s.name + '</label>' +
    '<div class="tag">' + s.sector + '</div></div>';
  grid.appendChild(card);
});
updateCount();

function updateCount() {
  var sel = SITES.filter(function(s){ return document.getElementById("chk_"+s.id) && document.getElementById("chk_"+s.id).checked; }).length;
  document.getElementById("countBadge").innerHTML = '<span class="badge">' + sel + ' siti selezionati</span>';
}

function toggleAll(cb) {
  SITES.forEach(function(s){ var el = document.getElementById("chk_"+s.id); if(el) el.checked = cb.checked; });
  updateCount();
}

function getSelected() {
  return SITES.filter(function(s){ return document.getElementById("chk_"+s.id) && document.getElementById("chk_"+s.id).checked; });
}

function encode(kw) { return encodeURIComponent(kw.trim()); }

function doSearch() {
  var kw = document.getElementById("keyword").value.trim();
  if (!kw) { alert("Inserisci un termine di ricerca"); return; }
  var selected = getSelected();
  if (!selected.length) { alert("Seleziona almeno un sito"); return; }
  var tbody = document.getElementById("resultBody");
  tbody.innerHTML = "";
  selected.forEach(function(s, i) {
    var url = s.url + encode(kw);
    var tr = document.createElement("tr");
    tr.innerHTML = '<td style="color:#475569">' + (i+1) + '</td>' +
      '<td style="font-weight:600">' + s.name + '</td>' +
      '<td><span class="badge">' + s.sector + '</span></td>' +
      '<td><a class="link-btn" href="' + url + '" target="_blank" rel="noopener">Apri &rarr;</a></td>';
    tbody.appendChild(tr);
  });
  document.getElementById("results").style.display = "block";
  document.getElementById("resultsTitle").textContent = selected.length + ' risultati per: "' + kw + '"';
  var tsv = "Sito	Settore	URL
";
  selected.forEach(function(s){ tsv += s.name + "	" + s.sector + "	" + s.url + encode(kw) + "
"; });
  document.getElementById("excelData").value = tsv;
  document.getElementById("copyExcel").style.display = "none";
  document.getElementById("results").scrollIntoView({behavior:"smooth"});
}

function openAll() {
  var kw = document.getElementById("keyword").value.trim();
  if (!kw) { alert("Inserisci prima un termine di ricerca"); return; }
  doSearch();
  var selected = getSelected();
  var i = 0;
  var interval = setInterval(function() {
    if (i >= selected.length) { clearInterval(interval); return; }
    window.open(selected[i].url + encode(kw), "_blank");
    i++;
  }, 600);
}

function toggleExcel() {
  var el = document.getElementById("copyExcel");
  el.style.display = el.style.display === "none" ? "block" : "none";
  if (el.style.display === "block") {
    document.getElementById("excelData").select();
    try { document.execCommand("copy"); } catch(e) {}
  }
}

document.getElementById("keyword").addEventListener("keydown", function(e){ if(e.key === "Enter") doSearch(); });
</script>
</body>
</html>
